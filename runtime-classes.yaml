# =============================================================================
# Kubernetes RuntimeClass manifests for CoCo runtime handlers
# =============================================================================
# Apply these after the Talos extension is installed and the node reboots:
#   kubectl apply -f runtime-classes.yaml
# =============================================================================

---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-qemu-snp
handler: kata-qemu-snp
overhead:
  podFixed:
    memory: "160Mi"
    cpu: "250m"
scheduling:
  nodeSelector:
    # Only schedule on nodes that have the CoCo extension installed.
    # Label your SEV-SNP-capable nodes:
    #   kubectl label node <node> coco.confidentialcontainers.org/snp=true
    coco.confidentialcontainers.org/snp: "true"

---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-qemu-coco-dev
handler: kata-qemu-coco-dev
overhead:
  podFixed:
    memory: "160Mi"
    cpu: "250m"

---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata
handler: kata
overhead:
  podFixed:
    memory: "160Mi"
    cpu: "250m"
