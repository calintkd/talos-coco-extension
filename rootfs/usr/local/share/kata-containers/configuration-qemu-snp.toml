# =============================================================================
# Kata Containers configuration for AMD SEV-SNP confidential containers
# =============================================================================
# Used by runtime handler: kata-qemu-snp
# Hypervisor: QEMU with SEV-SNP memory encryption
# Guest: Confidential initrd with attestation agent
# =============================================================================

[hypervisor.qemu]
path = "/usr/local/bin/qemu-system-x86_64"
kernel = "/usr/local/share/kata-containers/vmlinuz-snp.container"
initrd = "/usr/local/share/kata-containers/kata-containers-initrd-confidential.img"
firmware = "/usr/local/share/kata-containers/OVMF.fd"
firmware_volume = ""

# Machine type for SEV-SNP
machine_type = "q35"

# AMD SEV-SNP confidential guest settings
confidential_guest = true

# Rootfs type — initrd-based boot for confidential guests
rootfs_type = "ext4"

# Disable image= since we use initrd for confidential guests
image = ""

# Memory
default_vcpus = 1
default_maxvcpus = 0
default_memory = 2048
default_maxmemory = 0

# Use virtio-blk for block devices  
block_device_driver = "virtio-blk"

# Use virtio-9p for shared filesystem (more compatible with SEV-SNP QEMU builds)
# If your QEMU build supports virtio-fs with SEV-SNP, change to "virtio-fs"
shared_fs = "virtio-9p"

# Disable SELinux in the VMM process
disable_selinux = false

# Disable guest SELinux
disable_guest_selinux = true

# Annotations to allow
enable_annotations = ["enable_iommu", "virtio_fs_extra_args", "kernel_params"]

# Valid hypervisor paths
valid_hypervisor_paths = ["/usr/local/bin/qemu-system-x86_64"]

# Kernel parameters for the guest
# cgroup_no_v1=all forces cgroup v2 only inside the guest
kernel_params = "cgroup_no_v1=all systemd.unified_cgroup_hierarchy=1"

# QEMU firmware/BIOS search path
valid_firmware_paths = ["/usr/local/share/kata-containers/OVMF.fd"]

# QEMU firmware volume
valid_firmware_volume_paths = []

# Guest protection — SEV-SNP
guest_protection = "snp"

[agent.kata]
dial_timeout = 45

[runtime]
internetworking_model = "tcfilter"
disable_guest_seccomp = true
sandbox_cgroup_only = false
static_sandbox_resource_mgmt = false
sandbox_bind_mounts = []
vfio_mode = "guest-kernel"
disable_guest_empty_dir = false
experimental = []
create_container_timeout = 60
dan_conf = "/run/kata-containers/dans"
