# =============================================================================
# Talos machine configuration patch — CoCo extension
# =============================================================================
# Apply with:
#   talosctl gen config ... --config-patch @machine-config-patch.yaml
# =============================================================================

machine:
  install:
    extensions:
      - image: ghcr.io/<your-org>/talos-coco-extension:v1.0.0

  # Label the node for RuntimeClass scheduling
  nodeLabels:
    katacontainers.io/kata-runtime: "true"
    coco.confidentialcontainers.org/snp: "true"    # only on SEV-SNP bare-metal

  # Required: KVM + SEV kernel modules
  kernel:
    modules:
      - name: kvm_amd
      - name: ccp          # AMD Cryptographic Co-processor (provides /dev/sev)
